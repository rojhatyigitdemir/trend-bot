name: Gunluk Trend Analizi

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Trend Botunu Calistir
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u trend_bot.py

      - name: Sinyal Gecmisini Commitle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals_history.csv
          git diff --staged --quiet || git commit -m "chore: sinyal gecmisi guncellendi [skip ci]"
          git push
